<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-600">StudyTracker</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4">行動を記録</h2>
                    <form id="activityForm" class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">日付</label>
                            <input type="date" id="date" required class="w-full border rounded p-2 focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">カテゴリ</label>
                            <select id="category" class="w-full border rounded p-2 focus:outline-none focus:border-blue-500">
                                <option value="学習">学習</option>
                                <option value="睡眠">睡眠</option>
                                <option value="休憩">休憩</option>
                                <option value="仕事">仕事</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>

                        <div id="learningFields" class="space-y-4 border-l-4 border-blue-400 pl-3 py-1">
                            <div>
                                <label class="block text-sm text-blue-700 font-semibold mb-1">教科</label>
                                <select id="subject" class="w-full border rounded p-2 focus:outline-none focus:border-blue-500">
                                    <option value="英語">英語</option>
                                    <option value="数学">数学</option>
                                    <option value="国語">国語</option>
                                    <option value="理科">理科</option>
                                    <option value="社会">社会</option>
                                    <option value="プログラミング">プログラミング</option>
                                    <option value="その他">その他</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm text-blue-700 font-semibold mb-1">できるようになったこと</label>
                                <textarea id="learned" rows="2" placeholder="例：二次関数のグラフが書けるようになった！" class="w-full border rounded p-2 focus:outline-none focus:border-blue-500"></textarea>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-600 mb-1">開始</label>
                                <input type="time" id="startTime" required class="w-full border rounded p-2 focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-600 mb-1">終了</label>
                                <input type="time" id="endTime" required class="w-full border rounded p-2 focus:outline-none focus:border-blue-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">メモ (任意)</label>
                            <input type="text" id="memo" placeholder="使用した参考書など" class="w-full border rounded p-2 focus:outline-none focus:border-blue-500">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition">
                            記録を追加する
                        </button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4">今日の記録</h2>
                    <div id="timeline" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4">日別 学習時間の推移 (教科別)</h2>
                    <div class="relative h-64">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4" id="pieChartTitle">今日の行動内訳</h2>
                    <div class="relative h-72 flex justify-center">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Chart.jsにプラグインを登録
        Chart.register(ChartDataLabels);

        // --- データと色の設定 ---
        let activities = JSON.parse(localStorage.getItem('studyTrackerData')) || [];
        let barChartInstance = null;
        let pieChartInstance = null;

        // 教科ごとの固定カラー（色を分けて一目でわかるようにする）
        const subjectColors = {
            '英語': '#ef4444',     // 赤
            '数学': '#3b82f6',     // 青
            '国語': '#f59e0b',     // オレンジ
            '理科': '#10b981',     // 緑
            '社会': '#8b5cf6',     // 紫
            'プログラミング': '#14b8a6', // ティール
            'その他': '#6b7280'    // グレー
        };
        // その他の行動の固定カラー
        const categoryColors = {
            '睡眠': '#94a3b8', // 薄いグレー
            '休憩': '#a7f3d0', // 薄い緑
            '仕事': '#fcd34d', // 薄い黄色
            'その他': '#e2e8f0' // さらに薄いグレー
        };

        // 今日の日付を初期セット
        document.getElementById('date').value = new Date().toLocaleDateString('ja-JP').split('/').map(n => n.padStart(2, '0')).join('-');

        // カテゴリ変更時の表示切り替え
        document.getElementById('category').addEventListener('change', function(e) {
            const learningFields = document.getElementById('learningFields');
            learningFields.style.display = e.target.value === '学習' ? 'block' : 'none';
        });

        // 時間計算
        function calculateHours(start, end) {
            const [startH, startM] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);
            let diff = (endH + endM / 60) - (startH + startM / 60);
            if (diff < 0) diff += 24;
            return diff;
        }

        // フォーム送信
        document.getElementById('activityForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const category = document.getElementById('category').value;
            const isLearning = category === '学習';

            activities.push({
                id: Date.now().toString(),
                date: document.getElementById('date').value,
                category: category,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                memo: document.getElementById('memo').value,
                subject: isLearning ? document.getElementById('subject').value : '',
                learned: isLearning ? document.getElementById('learned').value : '',
            });
            saveData();
            document.getElementById('memo').value = '';
            document.getElementById('learned').value = '';
        });

        function saveData() {
            localStorage.setItem('studyTrackerData', JSON.stringify(activities));
            updateUI();
        }

        function deleteActivity(id) {
            activities = activities.filter(a => a.id !== id);
            saveData();
        }

        // --- 画面描画 ---
        function updateUI() {
            renderTimeline();
            renderCharts();
        }

        function renderTimeline() {
            const timelineContainer = document.getElementById('timeline');
            const currentDate = document.getElementById('date').value;
            const todayActivities = activities.filter(a => a.date === currentDate).reverse();

            if (todayActivities.length === 0) {
                timelineContainer.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">記録がありません</p>';
                return;
            }

            timelineContainer.innerHTML = todayActivities.map(act => `
                <div class="p-4 border border-gray-100 rounded-lg bg-white shadow-sm flex flex-col relative">
                    <button onclick="deleteActivity('${act.id}')" class="absolute top-3 right-3 text-gray-400 hover:text-red-500 text-xs">削除</button>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="font-bold text-gray-700 min-w-[3rem]">${act.category}</span>
                        <span class="text-gray-500 text-sm">${act.startTime} - ${act.endTime} (${calculateHours(act.startTime, act.endTime).toFixed(1)}h)</span>
                        ${act.subject ? `<span class="text-white text-xs px-2 py-0.5 rounded-full" style="background-color: ${subjectColors[act.subject] || '#3b82f6'}">${act.subject}</span>` : ''}
                    </div>
                    ${act.memo ? `<div class="text-gray-600 text-xs mb-1"><span class="text-gray-400">メモ:</span> ${act.memo}</div>` : ''}
                    ${act.learned ? `<div class="mt-2 bg-green-50 border border-green-100 p-2 rounded text-sm text-green-800"><div class="font-bold text-xs text-green-600 mb-0.5">✨ できるようになったこと</div>${act.learned.replace(/\n/g, '<br>')}</div>` : ''}
                </div>
            `).join('');
        }

        function renderCharts() {
            const currentDate = document.getElementById('date').value;
            document.getElementById('pieChartTitle').innerText = `${currentDate} の行動内訳`;

            // --- 1. 教科別の積み上げ棒グラフ用データ計算 ---
            const studyDataByDateAndSubject = {};
            const subjectsSet = new Set();

            activities.filter(a => a.category === '学習').forEach(act => {
                const hours = calculateHours(act.startTime, act.endTime);
                if (!studyDataByDateAndSubject[act.date]) studyDataByDateAndSubject[act.date] = {};
                studyDataByDateAndSubject[act.date][act.subject] = (studyDataByDateAndSubject[act.date][act.subject] || 0) + hours;
                subjectsSet.add(act.subject);
            });

            const dates = Object.keys(studyDataByDateAndSubject).sort();
            const subjectsArray = Array.from(subjectsSet);

            const barDatasets = subjectsArray.map(subject => ({
                label: subject,
                data: dates.map(date => studyDataByDateAndSubject[date][subject] ? Number(studyDataByDateAndSubject[date][subject].toFixed(1)) : 0),
                backgroundColor: subjectColors[subject] || '#3b82f6',
            }));

            // --- 2. 円グラフ用データ計算（学習は教科に分割） ---
            const dailyData = {};
            activities.filter(a => a.date === currentDate).forEach(act => {
                const hours = calculateHours(act.startTime, act.endTime);
                // 学習の場合は教科名に、それ以外はカテゴリ名にする
                const labelName = act.category === '学習' ? `学習 (${act.subject})` : act.category;
                dailyData[labelName] = (dailyData[labelName] || 0) + hours;
            });

            const pieLabels = Object.keys(dailyData);
            const pieData = Object.values(dailyData).map(h => Number(h.toFixed(1)));
            const pieBackgroundColors = pieLabels.map(label => {
                if (label.startsWith('学習 (')) {
                    const subject = label.match(/学習 \((.+)\)/)[1];
                    return subjectColors[subject] || '#3b82f6';
                }
                return categoryColors[label] || '#94a3b8';
            });

            // --- グラフ描画オプション共通設定 ---
            const dataLabelsConfig = {
                color: '#fff',
                font: { weight: 'bold', size: 12 },
                formatter: (value) => value > 0 ? value + 'h' : '', // 0hは非表示にしてスッキリさせる
                textShadowBlur: 4,
                textShadowColor: 'rgba(0,0,0,0.5)' // 白文字が見やすいように影をつける
            };

            // 棒グラフ
            if (barChartInstance) barChartInstance.destroy();
            barChartInstance = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { labels: dates, datasets: barDatasets },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, title: { display: true, text: '時間 (h)' } }
                    },
                    plugins: {
                        datalabels: dataLabelsConfig,
                        tooltip: {
                            callbacks: {
                                label: (context) => `${context.dataset.label}: ${context.parsed.y}h`
                            }
                        }
                    }
                }
            });

            // 円グラフ
            if (pieChartInstance) pieChartInstance.destroy();
            pieChartInstance = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: pieLabels,
                    datasets: [{
                        data: pieData,
                        backgroundColor: pieBackgroundColors
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        datalabels: dataLabelsConfig
                    }
                }
            });
        }

        document.getElementById('date').addEventListener('change', updateUI);
        updateUI();
    </script>
</body>
</html>
