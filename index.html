<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StudyTracker">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href='data:application/manifest+json;charset=utf-8,{"name":"StudyTracker","short_name":"Tracker","display":"standalone","start_url":".","background_color":"#f9fafb","theme_color":"#2563eb"}'>
    
    <title>StudyTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-blue-600 text-white p-4 text-center font-bold text-lg shadow-md z-10">
        StudyTracker
    </header>

    <main class="flex-1 overflow-y-auto pb-20 p-4" id="main-content">
        
        <div id="tab-record" class="space-y-6 block">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <form id="activityForm" class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-bold">日付</label>
                        <input type="date" id="date" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-blue-500 bg-transparent text-lg">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-bold">カテゴリ</label>
                        <select id="category" class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-blue-500 bg-transparent text-lg appearance-none">
                            <option value="学習">学習</option>
                            <option value="睡眠">睡眠</option>
                            <option value="休憩">休憩</option>
                            <option value="仕事">仕事</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>

                    <div id="learningFields" class="space-y-4 bg-blue-50/50 p-3 rounded-lg border border-blue-100">
                        <div>
                            <label class="block text-xs text-blue-600 mb-1 font-bold">教科</label>
                            <select id="subject" class="w-full border-b border-blue-200 py-2 focus:outline-none focus:border-blue-500 bg-transparent text-lg appearance-none">
                                <option value="英語">英語</option>
                                <option value="数学">数学</option>
                                <option value="国語">国語</option>
                                <option value="理科">理科</option>
                                <option value="社会">社会</option>
                                <option value="プログラミング">プログラミング</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-blue-600 mb-1 font-bold">できるようになったこと</label>
                            <textarea id="learned" rows="2" placeholder="例：二次関数のグラフが書ける！" class="w-full border rounded p-2 focus:outline-none focus:border-blue-500 text-sm"></textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1 font-bold">開始</label>
                            <input type="time" id="startTime" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-blue-500 bg-transparent text-lg">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1 font-bold">終了</label>
                            <input type="time" id="endTime" required class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-blue-500 bg-transparent text-lg">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-bold">メモ (任意)</label>
                        <input type="text" id="memo" placeholder="使用した参考書など" class="w-full border-b border-gray-300 py-2 focus:outline-none focus:border-blue-500 bg-transparent text-sm">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition active:scale-95">
                        記録を追加する
                    </button>
                </form>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-sm font-bold text-gray-500 mb-4 uppercase tracking-wider">今日の記録</h2>
                <div id="timeline" class="space-y-3"></div>
            </div>
        </div>

        <div id="tab-chart" class="space-y-6 hidden">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-sm font-bold text-gray-500 mb-4 uppercase tracking-wider" id="pieChartTitle">今日の行動内訳</h2>
                <div class="relative h-64 flex justify-center">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-sm font-bold text-gray-500 mb-4 uppercase tracking-wider">学習時間の推移</h2>
                <div class="relative h-64">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around pb-safe z-10">
        <button onclick="switchTab('record')" id="btn-record" class="flex-1 py-3 flex flex-col items-center text-blue-600 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            <span class="text-xs font-bold">記録</span>
        </button>
        <button onclick="switchTab('chart')" id="btn-chart" class="flex-1 py-3 flex flex-col items-center text-gray-400 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-xs font-bold">グラフ</span>
        </button>
    </nav>

    <script>
        Chart.register(ChartDataLabels);

        // ★いただいたGASのURLを設定しました
        const GAS_URL = 'https://script.google.com/a/macros/isk.ed.jp/s/AKfycbw51uGKe0MmFzaSTr5OyH_0LjCvP4PvCITcq3MoWHn_Z_XM4bwhycrkLGshUHor5yxp/exec';

        let activities = JSON.parse(localStorage.getItem('studyTrackerData')) || [];
        let barChartInstance = null;
        let pieChartInstance = null;

        const subjectColors = { '英語': '#ef4444', '数学': '#3b82f6', '国語': '#f59e0b', '理科': '#10b981', '社会': '#8b5cf6', 'プログラミング': '#14b8a6', 'その他': '#6b7280' };
        const categoryColors = { '睡眠': '#94a3b8', '休憩': '#a7f3d0', '仕事': '#fcd34d', 'その他': '#e2e8f0' };

        document.getElementById('date').value = new Date().toLocaleDateString('ja-JP').split('/').map(n => n.padStart(2, '0')).join('-');

        document.getElementById('category').addEventListener('change', function(e) {
            document.getElementById('learningFields').style.display = e.target.value === '学習' ? 'block' : 'none';
        });

        function calculateHours(start, end) {
            const [startH, startM] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);
            let diff = (endH + endM / 60) - (startH + startM / 60);
            if (diff < 0) diff += 24;
            return diff;
        }

        document.getElementById('activityForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'スプレッドシートに送信中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50');

            const category = document.getElementById('category').value;
            const isLearning = category === '学習';

            const newActivity = {
                id: Date.now().toString(),
                date: document.getElementById('date').value,
                category: category,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                memo: document.getElementById('memo').value,
                subject: isLearning ? document.getElementById('subject').value : '',
                learned: isLearning ? document.getElementById('learned').value : '',
            };

            activities.push(newActivity);
            saveData();
            
            document.getElementById('memo').value = '';
            document.getElementById('learned').value = '';
            document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });

            if(GAS_URL !== 'YOUR_GAS_URL_HERE') {
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain',
                        },
                        body: JSON.stringify(newActivity)
                    });
                    console.log('スプレッドシートへの記録が完了しました！');
                } catch (error) {
                    console.error('スプレッドシートの記録に失敗しました:', error);
                    alert('通信エラーが発生しました。データはスマホ内に保存されています。');
                }
            }

            submitBtn.innerText = originalBtnText;
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50');
        });

        function saveData() {
            localStorage.setItem('studyTrackerData', JSON.stringify(activities));
            updateUI();
        }

        function deleteActivity(id) {
            if(confirm('この記録をスマホから削除しますか？\n（※スプレッドシート側の記録は手動で消す必要があります）')) {
                activities = activities.filter(a => a.id !== id);
                saveData();
            }
        }

        function updateUI() {
            renderTimeline();
            if (document.getElementById('tab-chart').classList.contains('block')) {
                renderCharts();
            }
        }

        function renderTimeline() {
            const timelineContainer = document.getElementById('timeline');
            const currentDate = document.getElementById('date').value;
            const todayActivities = activities.filter(a => a.date === currentDate).reverse();

            if (todayActivities.length === 0) {
                timelineContainer.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">記録がありません</p>';
                return;
            }

            timelineContainer.innerHTML = todayActivities.map(act => `
                <div class="p-3 border border-gray-100 rounded-lg bg-white shadow-sm flex flex-col relative">
                    <button onclick="deleteActivity('${act.id}')" class="absolute top-2 right-2 p-2 text-gray-300 hover:text-red-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="font-bold text-gray-700 min-w-[3rem] text-sm">${act.category}</span>
                        <span class="text-gray-500 text-xs">${act.startTime} - ${act.endTime} (${calculateHours(act.startTime, act.endTime).toFixed(1)}h)</span>
                        ${act.subject ? `<span class="text-white text-[10px] px-2 py-0.5 rounded-full" style="background-color: ${subjectColors[act.subject] || '#3b82f6'}">${act.subject}</span>` : ''}
                    </div>
                    ${act.memo ? `<div class="text-gray-600 text-xs mb-1">${act.memo}</div>` : ''}
                    ${act.learned ? `<div class="mt-1 bg-green-50/50 border border-green-100 p-2 rounded text-xs text-green-800"><div class="font-bold text-[10px] text-green-600 mb-0.5">✨ できるようになったこと</div>${act.learned.replace(/\n/g, '<br>')}</div>` : ''}
                </div>
            `).join('');
        }

        function renderCharts() {
            const currentDate = document.getElementById('date').value;
            document.getElementById('pieChartTitle').innerText = `${currentDate} の行動内訳`;

            const studyDataByDateAndSubject = {};
            const subjectsSet = new Set();
            activities.filter(a => a.category === '学習').forEach(act => {
                const hours = calculateHours(act.startTime, act.endTime);
                if (!studyDataByDateAndSubject[act.date]) studyDataByDateAndSubject[act.date] = {};
                studyDataByDateAndSubject[act.date][act.subject] = (studyDataByDateAndSubject[act.date][act.subject] || 0) + hours;
                subjectsSet.add(act.subject);
            });
            const dates = Object.keys(studyDataByDateAndSubject).sort();
            const subjectsArray = Array.from(subjectsSet);
            const barDatasets = subjectsArray.map(subject => ({
                label: subject,
                data: dates.map(date => studyDataByDateAndSubject[date][subject] ? Number(studyDataByDateAndSubject[date][subject].toFixed(1)) : 0),
                backgroundColor: subjectColors[subject] || '#3b82f6',
            }));

            const dailyData = {};
            activities.filter(a => a.date === currentDate).forEach(act => {
                const hours = calculateHours(act.startTime, act.endTime);
                const labelName = act.category === '学習' ? `学習 (${act.subject})` : act.category;
                dailyData[labelName] = (dailyData[labelName] || 0) + hours;
            });
            const pieLabels = Object.keys(dailyData);
            const pieData = Object.values(dailyData).map(h => Number(h.toFixed(1)));
            const pieBackgroundColors = pieLabels.map(label => {
                if (label.startsWith('学習 (')) {
                    const subject = label.match(/学習 \((.+)\)/)[1];
                    return subjectColors[subject] || '#3b82f6';
                }
                return categoryColors[label] || '#94a3b8';
            });

            const dataLabelsConfig = {
                color: '#fff', font: { weight: 'bold', size: 10 },
                formatter: (value) => value > 0 ? value + 'h' : '',
                textShadowBlur: 2, textShadowColor: 'rgba(0,0,0,0.5)'
            };

            if (barChartInstance) barChartInstance.destroy();
            barChartInstance = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { labels: dates, datasets: barDatasets },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { x: { stacked: true }, y: { stacked: true, title: { display: true, text: '時間 (h)', font: {size: 10} } } },
                    plugins: { datalabels: dataLabelsConfig, legend: { position: 'bottom', labels: { boxWidth: 10, font: {size: 10} } } }
                }
            });

            if (pieChartInstance) pieChartInstance.destroy();
            pieChartInstance = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieBackgroundColors }] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { datalabels: dataLabelsConfig, legend: { position: 'bottom', labels: { boxWidth: 10, font: {size: 10} } } }
                }
            });
        }

        function switchTab(tabName) {
            const tabRecord = document.getElementById('tab-record');
            const tabChart = document.getElementById('tab-chart');
            const btnRecord = document.getElementById('btn-record');
            const btnChart = document.getElementById('btn-chart');

            if (tabName === 'record') {
                tabRecord.classList.replace('hidden', 'block');
                tabChart.classList.replace('block', 'hidden');
                btnRecord.classList.replace('text-gray-400', 'text-blue-600');
                btnChart.classList.replace('text-blue-600', 'text-gray-400');
            } else {
                tabRecord.classList.replace('block', 'hidden');
                tabChart.classList.replace('hidden', 'block');
                btnChart.classList.replace('text-gray-400', 'text-blue-600');
                btnRecord.classList.replace('text-blue-600', 'text-gray-400');
                renderCharts();
            }
        }

        document.getElementById('date').addEventListener('change', updateUI);
        updateUI();
    </script>
</body>
</html>
