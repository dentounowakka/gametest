<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Function Reader v33</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* --- 基本設定 --- */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #222;
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Mincho ProN", serif;
            user-select: none; -webkit-user-select: none;
        }

        /* --- ヘッダー --- */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 50px;
            background: #1a1a1a; color: #ddd; z-index: 100;
            display: flex; align-items: center; padding: 0 10px;
            border-bottom: 1px solid #333; gap: 10px;
        }
        
        /* ファイル選択ボタン */
        .file-label {
            background: #0066cc; color: white; padding: 6px 10px; 
            border-radius: 4px; font-size: 12px; cursor: pointer; flex-shrink: 0;
        }
        input[type="file"] { display: none; }

        /* 目次プルダウン（新機能） */
        #tocSelect {
            flex-grow: 1; /* 余ったスペースを使う */
            background: #333; color: #fff; border: 1px solid #555;
            padding: 5px; border-radius: 4px; font-size: 14px;
            max-width: 100%; text-overflow: ellipsis;
        }

        /* 縦書き切替ボタン */
        #toggleBtn {
            background: #444; color: #fff; border: none; 
            padding: 6px 10px; border-radius: 4px; font-size: 12px; flex-shrink: 0;
        }

        /* --- フッター --- */
        footer {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background: #1a1a1a; color: #ddd; z-index: 100;
            display: flex; justify-content: center; align-items: center; gap: 20px;
            border-top: 1px solid #333;
        }
        .nav-btn { background: #444; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; font-size: 16px; }

        /* --- ビューワー --- */
        #viewer-window {
            position: fixed; top: 50px; bottom: 60px; left: 0; right: 0;
            background: #fcfaf2; overflow: hidden;
        }

        #content {
            margin: 0; padding: 20px; box-sizing: border-box;
            font-size: 19px; line-height: 1.9; color: #111; text-align: justify;
            position: absolute; top: 0;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- 強制リセット --- */
        #content * { max-width: 100% !important; height: auto !important; box-sizing: border-box !important; }
        img { max-height: 90% !important; max-width: 90% !important; width: auto !important; display: block; margin: 0 auto; object-fit: contain; }

        /* --- モード --- */
        .mode-horizontal { writing-mode: horizontal-tb; left: 0; transform-origin: top left; }
        .mode-vertical { writing-mode: vertical-rl; text-orientation: mixed; right: 0; transform-origin: top right; }

        /* タップ領域 */
        .tap-zone { position: fixed; top: 50px; bottom: 60px; width: 20%; z-index: 50; }
        #tap-left { left: 0; }
        #tap-right { right: 0; }
        
        /* メッセージ＆しおりボタン */
        #msg-box {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 8px 20px; 
            border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
        }
        
        /* 続きから読むボタン（しおり用） */
        #resume-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #007bff; color: white; padding: 15px 30px;
            border-radius: 30px; font-size: 16px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer;
            z-index: 300; display: none; border: 2px solid white;
        }
    </style>
</head>
<body>

<header>
    <label class="file-label">📂<input type="file" id="inputFile" accept=".epub"></label>
    <select id="tocSelect">
        <option>ファイルを選択してください</option>
    </select>
    <button id="toggleBtn">縦書き</button>
</header>

<div id="viewer-window">
    <div id="content" class="mode-horizontal">
        <div style="height:100%; display:flex; justify-content:center; align-items:center; writing-mode:horizontal-tb;">
            <div style="text-align:center; color:#888;">
                <b>v33 しおり＆目次搭載版</b><br>
                右上のリストから章移動できます
            </div>
        </div>
    </div>
</div>

<div id="tap-left" class="tap-zone"></div>
<div id="tap-right" class="tap-zone"></div>

<div id="msg-box">Message</div>
<div id="resume-btn">🔖 続きから読む</div>

<footer>
    <button id="prevBtn" class="nav-btn">◀</button>
    <span id="page-info" style="font-size:14px;">-- / --</span>
    <button id="nextBtn" class="nav-btn">▶</button>
</footer>

<script>
    const content = document.getElementById('content');
    const viewerWindow = document.getElementById('viewer-window');
    const pageInfo = document.getElementById('page-info');
    const tocSelect = document.getElementById('tocSelect');
    const resumeBtn = document.getElementById('resume-btn');
    const msgBox = document.getElementById('msg-box');
    
    let textFiles = [];
    let currentChapterIndex = 0;
    let currentZip = null;
    let isVertical = false;
    let currentFileName = ""; // しおり保存用

    let currentPage = 0;
    let totalPages = 1;
    let onePageSize = 0;

    // --- レイアウトロジック (v32準拠) ---
    function refreshLayout(targetPage = 0) {
        const w = viewerWindow.clientWidth;
        const h = viewerWindow.clientHeight;
        const SAFE_MARGIN_H = 30; 
        const COL_GAP = 50;
        
        onePageSize = w;

        if (isVertical) {
            content.className = "mode-vertical";
            content.style.height = (h - SAFE_MARGIN_H) + "px";
            content.style.padding = `${SAFE_MARGIN_H/2}px 20px`;
            content.style.columnWidth = w + "px";
            content.style.columnGap = COL_GAP + "px";
            content.style.width = "auto"; 
        } else {
            content.className = "mode-horizontal";
            content.style.height = (h - SAFE_MARGIN_H) + "px";
            content.style.padding = "20px 20px";
            content.style.columnWidth = (w - COL_GAP) + "px";
            content.style.columnGap = COL_GAP + "px";
            content.style.width = "auto";
        }

        setTimeout(() => {
            const fullSize = content.scrollWidth;
            if (fullSize <= w) totalPages = 1;
            else totalPages = Math.ceil((fullSize + 10) / w);
            
            currentPage = targetPage;
            if (currentPage >= totalPages) currentPage = totalPages - 1;
            if (currentPage < 0) currentPage = 0;

            updateView();
        }, 150);
    }

    function updateView() {
        const moveDist = currentPage * onePageSize;
        if (isVertical) {
            content.style.transform = `translateX(${moveDist}px)`;
        } else {
            content.style.transform = `translateX(-${moveDist}px)`;
        }
        pageInfo.innerText = `${currentPage + 1} / ${totalPages}`;
        
        // ★ページ移動のたびにしおり保存
        saveBookmark();
    }

    // --- ファイル処理 ---
    document.getElementById('inputFile').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        
        if (typeof JSZip === 'undefined') { alert('エラー: ネット接続を確認してください'); return; }
        
        const zip = await JSZip.loadAsync(file);
        currentZip = zip;
        textFiles = [];

        // ファイルリスト作成
        zip.forEach((path, entry) => {
            if (entry.name.match(/\.(xhtml|html|htm)$/i) && !entry.name.includes(".ncx")) {
                textFiles.push(entry);
            }
        });
        
        // 並び替え
        textFiles.sort((a,b) => {
             const na = a.name.toLowerCase(); const nb = b.name.toLowerCase();
             if(na.includes("cover")||na.includes("表紙")) return -1;
             if(nb.includes("cover")||nb.includes("表紙")) return 1;
             return na.localeCompare(nb);
        });

        if (textFiles.length > 0) {
            // ★目次（プルダウン）の作成
            updateTOC();
            
            // ★しおりチェック
            const bookmark = localStorage.getItem('bm_v33_' + currentFileName);
            if (bookmark) {
                // しおりがあればボタンを表示して、クリック待ち
                resumeBtn.style.display = 'block';
                resumeBtn.onclick = () => {
                    const data = JSON.parse(bookmark);
                    loadChapter(data.chap, data.page);
                    resumeBtn.style.display = 'none';
                };
                // 裏ではとりあえず最初を開いておく
                loadChapter(0);
            } else {
                resumeBtn.style.display = 'none';
                loadChapter(0);
            }
        }
    };

    // ★目次作成関数
    function updateTOC() {
        tocSelect.innerHTML = ""; // クリア
        textFiles.forEach((file, index) => {
            const option = document.createElement("option");
            option.value = index;
            // パスからファイル名だけ抽出して表示 (例: Chapter01.xhtml)
            const simpleName = file.name.split('/').pop();
            option.text = `[${index+1}] ${simpleName}`;
            tocSelect.appendChild(option);
        });
    }

    // ★目次選択イベント
    tocSelect.onchange = (e) => {
        const idx = parseInt(e.target.value);
        loadChapter(idx);
    };

    async function loadChapter(index, targetPage = 0) {
        if (index < 0 || index >= textFiles.length) return;
        currentChapterIndex = index;
        
        // 目次の選択状態を同期
        tocSelect.value = index;

        content.style.opacity = 0;
        
        const txt = await textFiles[index].async("string");
        let html = txt.match(/<body[^>]*>([\s\S]*)<\/body>/i)?.[1] || txt;
        content.innerHTML = html;
        await restoreImages();

        setTimeout(() => {
            refreshLayout(targetPage);
            content.style.opacity = 1;
            showMsg(`Chapter ${index+1}`);
        }, 200);
    }

    // --- しおり機能 ---
    function saveBookmark() {
        if (!currentFileName) return;
        const data = {
            chap: currentChapterIndex,
            page: currentPage
        };
        localStorage.setItem('bm_v33_' + currentFileName, JSON.stringify(data));
    }

    async function restoreImages() {
        if (!currentZip) return;
        for (let img of content.querySelectorAll('img, image')) {
            let src = img.getAttribute('src') || img.getAttribute('xlink:href');
            if (!src) continue;
            let fname = src.split('/').pop();
            let target = Object.values(currentZip.files).find(f => f.name.endsWith(fname));
            if (target) {
                const b64 = await target.async("base64");
                const ext = fname.split('.').pop().toLowerCase();
                let mime = ext==='png'?'image/png':(ext==='svg'?'image/svg+xml':'image/jpeg');
                const d = `data:${mime};base64,${b64}`;
                if(img.hasAttribute('src')) img.src = d;
                else img.setAttribute('xlink:href', d);
            }
        }
    }

    // --- 操作 ---
    function goNext() {
        if (currentPage < totalPages - 1) { currentPage++; updateView(); }
        else if (currentChapterIndex < textFiles.length - 1) { loadChapter(currentChapterIndex + 1); }
        else showMsg("最後のページです");
    }
    function goPrev() {
        if (currentPage > 0) { currentPage--; updateView(); }
        else if (currentChapterIndex > 0) { 
            // 前の章へ（ページ指定なし＝0ページ目へ）
            // ※前の章の「最後」に飛ぶのは計算困難なため先頭へ飛びます
            loadChapter(currentChapterIndex - 1); 
        }
    }

    document.getElementById('nextBtn').onclick = goNext;
    document.getElementById('prevBtn').onclick = goPrev;
    document.getElementById('tap-left').onclick = () => isVertical ? goNext() : goPrev();
    document.getElementById('tap-right').onclick = () => isVertical ? goPrev() : goNext();

    document.getElementById('toggleBtn').onclick = (e) => {
        isVertical = !isVertical;
        e.target.innerText = isVertical ? "横書き" : "縦書き";
        refreshLayout(currentPage); // ページ位置を維持してレイアウト変更
    };
    
    window.onresize = () => setTimeout(() => refreshLayout(currentPage), 300);
    function showMsg(s) { msgBox.innerText=s; msgBox.style.opacity=1; setTimeout(()=>msgBox.style.opacity=0,2000); }
</script>
</body>
</html>
